# Упрощенная тема документации
# Основные цвета: белый фон, #E3EBFF (светло-синий) для выделения, #D8F0DE (светло-зеленый) для цитат

# Основной акцентный цвет - синий
base-brand: "#5282FF"

# Фон страницы - белый
base-background: "#FFFFFF"

# Цвет выделения - светло-синий
base-selection: "#E3EBFF"

# Цвет цитат - светло-зеленый
quote: "#D8F0DE"

# Темная тема
dark:
  base-brand: "#5282FF"
  base-background: "#1A1A1A"
  base-selection: "#2A2A2A"
  quote: "#1E3A1E"
